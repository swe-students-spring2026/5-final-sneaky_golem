version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: golem-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  machine-learning-client:
    image: ah6820/golem-ml-client:latest
    container_name: golem-ml-client
    ports:
      - "5001:5001"
    depends_on:
      - mongodb
  
  web-app:
    image: ah6820/golem-web-app:latest
    container_name: golem-web-app
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - machine-learning-client
    environment:
    - MONGO_URI=mongodb://mongodb:27017
    - MONGO_DBNAME=golem-db
    - SECRET_KEY=watch_tv
    - ML_CLIENT_URL=http://machine-learning-client:5001

volumes:
  mongo_data: