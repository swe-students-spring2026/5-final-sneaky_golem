{% extends "template.html" %}

{% block title %}{{ puzzle.puzzle_name }}{% endblock %}

{% block content %}
<h1 class="page-title">{{ puzzle.puzzle_name }}</h1>
<script id="data-puzzle-id"       type="application/json">"{{ puzzle.puzzle_id }}"</script>
<script id="data-board"           type="application/json">{{ board_json | safe }}</script>
<script id="data-solutions"       type="application/json">{{ solutions_json | safe }}</script>
<script id="data-active-solution" type="application/json">{{ active_solution_json | safe }}</script>

<div class="board-layout">
    <div class="board-sidebar">
        <div class="sidebar-section">
            <input id="board-name-input" class="board-input" type="text"
                    value="{{ puzzle.puzzle_name }}" />
            <button id="rename-btn" class="btn" style="width:100%; margin-top:6px;">RENAME</button>
            <a href="/board/{{ puzzle.puzzle_id }}/edit"
                class="btn" style="display:block; text-align:center; margin-top:6px;">OPEN EDITOR</a>
            <form action="{{ url_for('main.puzzle_edit_solution', puzzle_id=puzzle.puzzle_id) }}">
                <button id="btn-solve" class="btn" style="width:100%;">START SOLVE</button>
            </form>
            <a href="/board/{{ puzzle.puzzle_id }}/share"
                class="btn" style="display:block; text-align:center; margin-top:6px;">SHARE WITH COMMUNITY</a>
        </div>

        <div class="sidebar-section" style="margin-top:40px;">
            <button id="delete-btn" class="btn" style="width:100%;">DELETE BOARD</button>
        </div>
    </div>

    <div class="board-center">
        <div id="tetris-board" class="tetris-board">
        </div>

        <div class="solution-controls">
            <button id="btn-first" class="btn ctrl-btn">&#9664;&#9664; FIRST</button>
            <button id="btn-prev"  class="btn ctrl-btn">&#9664; PREV</button>
            <span   id="step-counter" class="ctrl-step">STEP — / —</span>
            <button id="btn-next"  class="btn ctrl-btn">NEXT &#9654;</button>
            <button id="btn-last"  class="btn ctrl-btn">LAST &#9654;&#9654;</button>
        </div>
    </div>

    <div class="board-solutions">
        <label class="sidebar-label">SOLUTIONS</label>

        <div class="sort-btns">
            <button id="sort-date"  class="btn sort-btn sort-active">DATE</button>
            <button id="sort-likes" class="btn sort-btn">LIKES</button>
        </div>

        <div id="solution-list">
        </div>

        <div class="pagination">
            <button id="page-prev" class="btn ctrl-btn">&#9664;</button>
            <span   id="page-counter" class="ctrl-step">1 / 1</span>
            <button id="page-next" class="btn ctrl-btn">&#9654;</button>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/saved_board.js"></script>
{% endblock %}
