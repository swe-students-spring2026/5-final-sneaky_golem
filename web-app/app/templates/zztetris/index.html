<!DOCTYPE html>
<html>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
	<script src="{{url_for('static', filename='zztetris/rotationSystem.js')}}"></script>
	<script src="{{url_for('static', filename='zztetris/io.js')}}"></script>
	<script src="{{url_for('static', filename='zztetris/utils.js')}}"></script>
	<script src="{{url_for('static', filename='zztetris/tetris-fumen.js')}}"></script>
	<script defer src="{{url_for('static', filename='zztetris/base.js')}}"></script>
	<script defer src="{{url_for('static', filename='zztetris/tetrio.js')}}"></script>
	<script defer src="{{url_for('static', filename='zztetris/zztetris.js')}}"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
	<link rel="icon" href="{{url_for('static', filename='zztetris/assets/pieceSprite/z.png')}}" />
	<link rel="stylesheet" type="text/css" href="{{url_for('static', filename='zztetris/styles/zztetris.css')}}" />
	<link rel="stylesheet" type="text/css" href="{{url_for('static', filename='zztetris/styles/paint_bucket.css')}}" />
	<link rel="stylesheet" type="text/css" href="{{url_for('static', filename='zztetris/styles/import_export.css')}}" />
	<link rel="stylesheet" type="text/css" href="{{url_for('static', filename='zztetris/styles/board_settings.css')}}" />
	<head>
		<meta charset="UTF-8" />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://swng.github.io/zztetris/" />
		<meta property="og:title" content="ZZTetris" />
		<meta
			property="og:description"
			content='a tetris client that starts with ZZ so you can type "ZZ" into your address bar and have it autocomplete'
		/>
		<meta
			property="og:image"
			content="https://cdn.discordapp.com/attachments/209687919361916928/898230618012418088/unknown.png"
		/>
		<title>ZZTetris</title>
		<div id="board-data" data="{{puzzle.board_json}}"></div>
		<div id="queue-data" data="{{puzzle.queue_json}}"></div>
	</head>
	<body style="background-color: #222; color: #fff">
		<div style="top: 50%; left: 50%; position: fixed; transform: translate(-50%, -50%); display: flex">
			<div class="queue">
				HOLD
				<hr />
				<canvas id="h" width="90" height="60"></canvas>
				<div id="notif" style="width: 90px; text-align: center"></div>
			</div>

			<div>
				<canvas id="b" width="200" height="400" style="padding: 18px"></canvas>
			</div>

			<div class="queue">
				NEXT
				<hr />
				<canvas id="n" width="90" height="360"></canvas>
			</div>

			<div class="board-settings">
				<form action="/board/{{ id }}" method="POST">
					<button class="button" type="submit" name="solution-data" id="solution-data" value="">Save Solution</button>
				</form>
				<p></p>
			</div>
		</div>
		<button class="button" target="popup" onclick="ctrlsPopup('/controls')">Game Settings</button>

        <div id = "tcc" style class = "tc">
            <div>
                <span id="tc-un"><svg><use xlink:href="{{url_for('static', filename='zztetris/assets/icons/dark.svg#s-un')}}"></use></svg></span>
				<span id="tc-dr"><svg><use xlink:href="{{url_for('static', filename='zztetris/assets/icons/dark.svg#s-r180')}}"></use></svg></span>
                <span id="tc-h"><svg><use xlink:href="{{url_for('static', filename='zztetris/assets/icons/dark.svg#s-hold')}}"></use></svg></span>
                <span id="tc-hd"><svg><use xlink:href="{{url_for('static', filename='zztetris/assets/icons/dark.svg#s-harddrop')}}"></use></svg></span>
                </div>
                <div>
                <span id="tc-l"><svg><use xlink:href="{{url_for('static', filename='zztetris/assets/icons/dark.svg#s-back')}}"></use></svg></span>
                <span id="tc-r"><svg><use xlink:href="{{url_for('static', filename='zztetris/assets/icons/dark.svg#s-forward')}}"></use></svg></span>
                <span id="tc-d"><svg><use xlink:href="{{url_for('static', filename='zztetris/assets/icons/dark.svg#s-down')}}"></use></svg></span>
                <span id="tc-cc"><svg><use xlink:href="{{url_for('static', filename='zztetris/assets/icons/dark.svg#s-ccw')}}"></use></svg></span>
                <span id="tc-c"><svg><use xlink:href="{{url_for('static', filename='zztetris/assets/icons/dark.svg#s-cw')}}"></use></svg></span>
                <span id="tc-re"><svg><use xlink:href="{{url_for('static', filename='zztetris/assets/icons/dark.svg#s-reload')}}"></use></svg></span>
                </div>
            <canvas id="mobile_controls"></canvas>
        </div>
	</body>
</html>
